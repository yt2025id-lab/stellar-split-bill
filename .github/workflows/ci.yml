name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run contract tests
        run: cargo test --verbose

  contract-build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown
      - uses: actions/upload-artifact@v5
        with:
          name: wasm-artifacts
          path: |
            target/wasm32-unknown-unknown/release/splitbill_factory.wasm
            target/wasm32-unknown-unknown/release/splitbill_vault.wasm

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FACTORY_CONTRACT: ${{ vars.VITE_FACTORY_CONTRACT }}
          VITE_VAULT_WASM_HASH: ${{ vars.VITE_VAULT_WASM_HASH }}
        run: npm run build
